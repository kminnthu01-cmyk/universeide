
apiVersion: apps/v1
kind: Deployment
metadata:
  name: universe-ide
  labels:
    app: universe-ide
spec:
  replicas: 3
  selector:
    matchLabels:
      app: universe-ide
  template:
    metadata:
      labels:
        app: universe-ide
    spec:
      containers:
      - name: universe
        image: universe-ide:latest
        ports:
        - containerPort: 8080
        env:
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: universe-secrets
              key: api-key
        resources:
          limits:
            cpu: "4"
            memory: 8Gi
          requests:
            cpu: "2"
            memory: 4Gi
        livenessProbe:
          httpGet:
            path: /api/health
            port: 8080
          initialDelaySeconds: 30
        readinessProbe:
          httpGet:
            path: /api/health
            port: 8080
          initialDelaySeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: universe-ide
spec:
  selector:
    app: universe-ide
  ports:
  - port: 80
    targetPort: 8080
  type: LoadBalancer
