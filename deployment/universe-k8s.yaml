# Universe IDE - Kubernetes Deployment

apiVersion: apps/v1
kind: Deployment
metadata:
  name: universe-ide
  labels:
    app: universe-ide
spec:
  replicas: 3
  selector:
    matchLabels:
      app: universe-ide
  template:
    metadata:
      labels:
        app: universe-ide
    spec:
      containers:
      - name: ide
        image: universe-ide:latest
        ports:
        - containerPort: 8080
        resources:
          limits:
            cpu: "2"
            memory: 4Gi
          requests:
            cpu: "500m"
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: universe-ide
spec:
  selector:
    app: universe-ide
  ports:
  - port: 80
    targetPort: 8080
  type: LoadBalancer
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: universe-ide
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: universe-ide
  minReplicas: 1
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70